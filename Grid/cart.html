<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <div class="logo">🛍️ ShopGrid</div>
            <input type="checkbox" id="burger-toggle">
            <label for="burger-toggle" class="burger">☰</label>
            <ul class="menu">
                <li><a href="news.html">Новости</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="order.html">Оформить заказ</a></li>
                <li><a href="contacts.html">Контакты</a></li>
                <li><a href="cart.html">Корзина</a></li>
            </ul>
        </div>
    </header>

    <main class="main">
        <h2>🛒 Корзина</h2>
        <div class="cart-container">
            <div class="cart-item cart-header">
                <div>Товар</div>
                <div>Название</div>
                <div>Цена</div>
                <div>Кол-во</div>
                <div></div>
            </div>
            <div class="cart-item">
                <img src="tshort.jpg" alt="">
                <div class="item-title">Футболка хлопок</div>
                <div class="item-price">1 290 ₽</div>
                <div class="item-quantity"><input type="number" value="2" min="1"></div>
                <button class="remove-btn">✖</button>
            </div>
            <div class="cart-item">
                <img src="jeans.jpg" alt="">
                <div class="item-title">Джинсы Slim</div>
                <div class="item-price">3 490 ₽</div>
                <div class="item-quantity"><input type="number" value="1" min="1"></div>
                <button class="remove-btn">✖</button>
            </div>
            <div class="cart-item">
                <img src="backpack.png" alt="">
                <div class="item-title">Рюкзак городской</div>
                <div class="item-price">2 790 ₽</div>
                <div class="item-quantity"><input type="number" value="1" min="1"></div>
                <button class="remove-btn">✖</button>
            </div>

            <div class="cart-total">
                Итого: <strong>8 860 ₽</strong>
                <br>
                <a href="order.html" class="btn-order">Перейти к оформлению</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 ShopGrid. Все права защищены.</p>
    </footer>
</body>
</html>
