<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог товаров</title>
    <link rel="stylesheet" href="catalog.css">
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <div class="logo">🛍️ ShopGrid</div>
            <input type="checkbox" id="burger-toggle">
            <label for="burger-toggle" class="burger">☰</label>
            <ul class="menu">
                <li><a href="news.html">Новости</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="order.html">Оформить заказ</a></li>
                <li><a href="contacts.html">Контакты</a></li>
                <li><a href="cart.html">Корзина</a></li>
            </ul>
        </div>
    </header>

    <main class="main">
        <h2>📦 Популярные товары</h2>
        <div class="products-grid">
            <div class="product-card">
                <img src="tshort.jpg" alt="Товар">
                <h3>Футболка хлопок</h3>
                <div class="price">1 290 ₽</div>
                <button class="btn">В корзину</button>
            </div>
            <div class="product-card">
                <img src="jeans.jpg" alt="Товар">
                <h3>Джинсы Slim</h3>
                <div class="price">3 490 ₽</div>
                <button class="btn">В корзину</button>
            </div>
            <div class="product-card">
                <img src="cross.png" alt="Товар">
                <h3>Кроссовки белые</h3>
                <div class="price">4 990 ₽</div>
                <button class="btn">В корзину</button>
            </div>
            <div class="product-card">
                <img src="backpack.png" alt="Товар">
                <h3>Рюкзак городской</h3>
                <div class="price">2 790 ₽</div>
                <button class="btn">В корзину</button>
            </div>
            <div class="product-card">
                <img src="watch.jpg" alt="Товар">
                <h3>Часы наручные</h3>
                <div class="price">5 990 ₽</div>
                <button class="btn">В корзину</button>
            </div>
            <div class="product-card">
                <img src="cap.png" alt="Товар">
                <h3>Кепка бейсболка</h3>
                <div class="price">990 ₽</div>
                <button class="btn">В корзину</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 ShopGrid. Все права защищены.</p>
    </footer>
</body>
</html>
