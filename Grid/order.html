<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа</title>
    <link rel="stylesheet" href="order.css">
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <div class="logo">🛍️ ShopGrid</div>
            <input type="checkbox" id="burger-toggle">
            <label for="burger-toggle" class="burger">☰</label>
            <ul class="menu">
                <li><a href="news.html">Новости</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="order.html">Оформить заказ</a></li>
                <li><a href="contacts.html">Контакты</a></li>
                <li><a href="cart.html">Корзина</a></li>
            </ul>
        </div>
    </header>

    <main class="main">
        <h2>📝 Оформление заказа</h2>
        <form class="order-form" onsubmit="alert('Заказ оформлен (демо)'); return false;">
            <!-- 1. Текстовое поле -->
            <div class="form-group">
                <label for="name">Имя *</label>
                <input type="text" id="name" name="name" required placeholder="Иван Иванов">
            </div>
            <!-- 2. Поле email (тип email) -->
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="mail@example.com">
            </div>
            <!-- 3. Поле телефон (тип tel) -->
            <div class="form-group">
                <label for="phone">Телефон *</label>
                <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 123-45-67">
            </div>
            <!-- 4. Поле адрес (текстовое) -->
            <div class="form-group">
                <label for="address">Адрес доставки *</label>
                <input type="text" id="address" name="address" required placeholder="Город, улица, дом">
            </div>
            <!-- 5. Выпадающий список (select) -->
            <div class="form-group">
                <label for="delivery">Способ доставки</label>
                <select id="delivery" name="delivery">
                    <option value="courier">Курьером (300 ₽)</option>
                    <option value="pickup">Самовывоз (бесплатно)</option>
                    <option value="post">Почта России</option>
                </select>
            </div>
            <!-- 6. Текстовое поле комментарий (textarea) -->
            <div class="form-group">
                <label for="comment">Комментарий к заказу</label>
                <textarea id="comment" name="comment" rows="3" placeholder="Ваши пожелания..."></textarea>
            </div>
            <!-- 7. Чекбокс (согласие) -->
            <div class="form-group checkbox-group">
                <input type="checkbox" id="agree" name="agree" required>
                <label for="agree">Я согласен с условиями обработки данных</label>
            </div>
            <button type="submit" class="btn-submit">Подтвердить заказ</button>
        </form>
        <p style="margin-top:1rem; font-size:0.9rem; color:#7f8c8d;">* Обязательные поля</p>
    </main>

    <footer class="footer">
        <p>© 2026 ShopGrid. Все права защищены.</p>
    </footer>
</body>
</html>
