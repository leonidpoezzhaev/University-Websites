<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бронирование Wanderlust</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="logo">Wanderlust</a>
      <button class="burger" id="burger" aria-label="Открыть меню">☰</button>
      <nav class="nav" id="nav">
        <ul class="nav__list">
          <li><a href="index.html">Главная</a></li>
          <li><a href="news.html">Новости</a></li>
          <li><a href="destinations.html">Направления</a></li>
          <li><a href="booking.html" class="active">Бронирование</a></li>
          <li><a href="gallery.html">Галерея</a></li>
          <li><a href="about.html">О нас</a></li>
          <li><a href="contacts.html">Контакты</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main container">
    <h1>Заявка на путешествие</h1>
    <div class="booking-grid">
      <form id="bookingForm" class="form">
        <div class="form-group"><label for="name">Имя *</label><input type="text" id="name" required></div>
        <div class="form-group"><label for="email">Email *</label><input type="email" id="email" required></div>
        <div class="form-group"><label for="phone">Телефон</label><input type="tel" id="phone"></div>
        <div class="form-group"><label for="destination">Направление *</label>
          <select id="destination" required>
            <option value="">Выберите...</option>
            <option>Париж</option><option>Токио</option><option>Нью-Йорк</option><option>Рим</option><option>Барселона</option>
          </select></div>
        <div class="form-group"><label for="departure">Дата отправления</label><input type="date" id="departure"></div>
        <div class="form-group"><label for="return">Дата возвращения</label><input type="date" id="return"></div>
        <div class="form-group"><label>Количество взрослых</label><input type="number" id="adults" min="0" value="1"></div>
        <div class="form-group"><label>Количество детей</label><input type="number" id="children" min="0" value="0"></div>
        <fieldset class="form-group"><legend>Тип размещения</legend>
          <label><input type="radio" name="accommodation" value="Отель" checked> Отель</label>
          <label><input type="radio" name="accommodation" value="Хостел"> Хостел</label>
          <label><input type="radio" name="accommodation" value="Апартаменты"> Апартаменты</label>
        </fieldset>
        <div class="form-group"><label for="comments">Особые пожелания</label><textarea id="comments" rows="3"></textarea></div>
        <button type="submit" class="btn">Отправить заявку</button>
      </form>
      <div id="formResult" class="form-result"></div>
    </div>

    <h2>Предыдущие заявки</h2>
    <div class="table-wrapper">
      <table id="bookingsTable">
        <thead><tr><th>Имя</th><th>Email</th><th>Направление</th><th>Дата</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>© 2026 Wanderlust Travel Blog</p></div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
