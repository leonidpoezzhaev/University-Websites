<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Colizeum — Контакты</title>
<link rel="stylesheet" href="contacts_style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <div class="logo-wrap">
          <!-- Замените src на ваше фото логотипа -->
          <img src="Ellipse%201.png" alt="Логотип Colizeum">
        </div>
        <div class="site-name">Colizeum</div>
      </div>
      <nav>
        <ul>
          <li><a href="colizeum.html">Новости</a></li>
          <li><a href="admins.html">Админы</a></li>
          <li><a href="prices.html">Цены</a></li>
          <li><a href="timetable.html">Расписание</a></li>
          <li><a href="contacts.html" style="text-decoration:underline;font-weight:600">Контакты</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="contacts" aria-labelledby="contacts-title">
        <h1 id="contacts-title" class="title">Контакты</h1>

        <div class="row">
          <div class="col-img">
              <img src="orig.jpg" alt="Фотография учреждения Colizeum">
          </div>

          <div class="col-info">
            <div class="contact-item">
              <div class="contact-icon">📍</div>
              <div>
                <strong>Адрес</strong>
                <div>г. Пермь, ТЦ iMALL, 4 этаж, Colizeum</div>
              </div>
            </div>

            <div class="contact-item">
              <div class="contact-icon">📞</div>
              <div>
                <strong>Телефоны</strong>
                <div>Ресепшн +7 (495) 123‑45‑67</div>
                <div>Техническая поддержка +7 (495) 234‑56‑78</div>
              </div>
            </div>

            <div class="contact-item">
              <div class="contact-icon">✉️</div>
              <div>
                <strong>Email</strong>
                <div>info@colizeum.ru</div>
              </div>
            </div>

            <div class="contact-item">
              <div class="contact-icon">⏱️</div>
              <div>
                <strong>Часы работы</strong>
                <div>Ежедневно 10:00 — 22:00</div>
              </div>
            </div>

            <div class="address-map">
              <!-- Вставьте iframe карты при необходимости -->
              <iframe
                src="https://www.google.com/maps?q=Пермь+ТЦ+iMALL&output=embed"
                width="100%" height="240" style="border:0;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
                title="Карта Colizeum"></iframe>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="icon"><img src="Telegram%20App.png" alt="vk"></div>
      <div class="icon"><img src="VK%20com.png" alt="telegram"></div>
      <div class="icon"><img src="Phone.png" alt="instagram"></div>
    </footer>
  </div>
</body>
</html>
